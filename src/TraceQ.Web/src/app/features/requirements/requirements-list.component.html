<div class="requirements-page">
  <h2>Requirements</h2>

  <mat-progress-bar *ngIf="isLoading" mode="indeterminate"></mat-progress-bar>

  <div class="table-container">
    <table mat-table [dataSource]="dataSource" matSort (matSortChange)="onSortChange($event)"
           class="dense-table full-width">
      <!-- Number Column -->
      <ng-container matColumnDef="requirementNumber">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Number</th>
        <td mat-cell *matCellDef="let row" class="req-number">{{ row.requirementNumber }}</td>
      </ng-container>

      <!-- Name Column -->
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Name</th>
        <td mat-cell *matCellDef="let row">{{ row.name }}</td>
      </ng-container>

      <!-- Type Column -->
      <ng-container matColumnDef="type">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Type</th>
        <td mat-cell *matCellDef="let row">{{ row.type || '-' }}</td>
      </ng-container>

      <!-- State Column -->
      <ng-container matColumnDef="state">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>State</th>
        <td mat-cell *matCellDef="let row">{{ row.state || '-' }}</td>
      </ng-container>

      <!-- Priority Column -->
      <ng-container matColumnDef="priority">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Priority</th>
        <td mat-cell *matCellDef="let row">
          <span class="priority-chip" *ngIf="row.priority">{{ row.priority }}</span>
          <span *ngIf="!row.priority">-</span>
        </td>
      </ng-container>

      <!-- Module Column -->
      <ng-container matColumnDef="module">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Module</th>
        <td mat-cell *matCellDef="let row">{{ row.module || '-' }}</td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"
          (click)="openDetail(row)"
          class="clickable-row">
      </tr>

      <!-- No Data Row -->
      <tr class="mat-row no-data-row" *matNoDataRow>
        <td class="mat-cell" [colSpan]="displayedColumns.length">
          <div class="no-data" *ngIf="!isLoading">No requirements found. Import a CSV file to get started.</div>
        </td>
      </tr>
    </table>
  </div>

  <mat-paginator [length]="totalCount"
                 [pageSize]="pageSize"
                 [pageIndex]="pageIndex"
                 [pageSizeOptions]="[10, 20, 50, 100]"
                 (page)="onPageChange($event)"
                 showFirstLastButtons>
  </mat-paginator>
</div>
