<div class="chart-container" *ngIf="!isLoading && !errorMessage && hasData">
  <canvas baseChart
    [type]="chartType"
    [labels]="chartLabels"
    [datasets]="chartDatasets"
    [options]="chartOptions"
    (chartClick)="onChartClick($event)">
  </canvas>
</div>

<div class="no-data-container" *ngIf="!isLoading && !errorMessage && !hasData">
  <mat-icon>pie_chart_outline</mat-icon>
  <p>No data available</p>
</div>

<div class="loading-container" *ngIf="isLoading">
  <mat-spinner diameter="36"></mat-spinner>
</div>

<div class="error-container" *ngIf="errorMessage">
  <mat-icon>error_outline</mat-icon>
  <p>{{ errorMessage }}</p>
  <button mat-stroked-button (click)="refresh()">Retry</button>
</div>
