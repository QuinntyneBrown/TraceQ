<h2 mat-dialog-title>Add Widget</h2>

<mat-dialog-content>
  <div class="form-group">
    <label class="form-label">Widget Type</label>
    <mat-selection-list [multiple]="false" (selectionChange)="selectedType = $event.options[0].value ?? 'stats'">
      <mat-list-option *ngFor="let wt of widgetTypes"
                       [value]="wt.value"
                       [selected]="wt.value === selectedType">
        <mat-icon matListItemIcon>{{ wt.icon }}</mat-icon>
        <span>{{ wt.label }}</span>
      </mat-list-option>
    </mat-selection-list>
  </div>

  <div class="form-group" *ngIf="isDistribution">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Distribution Field</mat-label>
      <mat-select [(value)]="selectedField">
        <mat-option *ngFor="let f of distributionFields" [value]="f.value">
          {{ f.label }}
        </mat-option>
      </mat-select>
    </mat-form-field>
  </div>

  <div class="form-group">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Custom Title (optional)</mat-label>
      <input matInput [(ngModel)]="customTitle" [placeholder]="resolvedTitle">
    </mat-form-field>
  </div>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="onCancel()">Cancel</button>
  <button mat-flat-button color="primary" (click)="onAdd()">
    <mat-icon>add</mat-icon>
    Add
  </button>
</mat-dialog-actions>
