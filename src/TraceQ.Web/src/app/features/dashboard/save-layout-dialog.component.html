<h2 mat-dialog-title>Save Layout</h2>

<mat-dialog-content>
  <mat-form-field appearance="outline" class="full-width">
    <mat-label>Layout Name</mat-label>
    <input matInput [(ngModel)]="layoutName" placeholder="e.g. My Dashboard" cdkFocusInitial>
  </mat-form-field>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="onCancel()">Cancel</button>
  <button mat-flat-button color="primary" (click)="onSave()" [disabled]="!layoutName.trim()">
    <mat-icon>save</mat-icon>
    Save
  </button>
</mat-dialog-actions>
