<div class="dashboard-header">
  <h2>Dashboard</h2>
  <span class="spacer"></span>
  <button mat-stroked-button (click)="addWidget()" class="action-btn">
    <mat-icon>add</mat-icon>
    Add Widget
  </button>
  <button mat-stroked-button (click)="resetLayout()" class="action-btn">
    <mat-icon>refresh</mat-icon>
    Reset Layout
  </button>
</div>

<gridster [options]="gridOptions" class="dashboard-grid">
  <gridster-item *ngFor="let widget of widgets; let i = index" [item]="widget">
    <mat-card class="widget-card">
      <mat-card-header>
        <mat-card-title class="widget-title">{{ widget.title }}</mat-card-title>
        <span class="spacer"></span>
        <button mat-icon-button (click)="removeWidget(i)" matTooltip="Remove widget" class="remove-btn">
          <mat-icon>close</mat-icon>
        </button>
      </mat-card-header>
      <mat-card-content class="widget-content">
        <div class="placeholder-content" [ngSwitch]="widget.widgetType">
          <div *ngSwitchCase="'stat'" class="stat-placeholder">
            <mat-icon class="placeholder-icon">analytics</mat-icon>
            <p>Statistics widget placeholder</p>
          </div>
          <div *ngSwitchCase="'chart'" class="chart-placeholder">
            <mat-icon class="placeholder-icon">bar_chart</mat-icon>
            <p>Chart widget placeholder</p>
          </div>
          <div *ngSwitchCase="'table'" class="table-placeholder">
            <mat-icon class="placeholder-icon">table_chart</mat-icon>
            <p>Table widget placeholder</p>
          </div>
          <div *ngSwitchDefault class="default-placeholder">
            <mat-icon class="placeholder-icon">widgets</mat-icon>
            <p>Widget placeholder</p>
          </div>
        </div>
      </mat-card-content>
    </mat-card>
  </gridster-item>
</gridster>
