<div class="import-page">
  <h2>Import Requirements</h2>
  <p class="subtitle">Upload a CSV file exported from Windchill or other requirements management tools.</p>

  <app-file-upload (importComplete)="onImportComplete($event)"></app-file-upload>

  <app-import-results *ngIf="importResult" [result]="importResult"></app-import-results>

  <div class="history-section">
    <h3>Import History</h3>
    <app-import-history></app-import-history>
  </div>
</div>
