<mat-toolbar color="primary" class="app-header">
  <button mat-icon-button (click)="onToggleSidenav()" matTooltip="Toggle navigation">
    <mat-icon>menu</mat-icon>
  </button>

  <span class="brand-name">TraceQ</span>
  <span class="brand-subtitle">Requirements Intelligence</span>

  <span class="spacer"></span>

  <button mat-icon-button
          (click)="onToggleTheme()"
          [matTooltip]="isDarkMode ? 'Switch to light mode' : 'Switch to dark mode'">
    <mat-icon>{{ isDarkMode ? 'light_mode' : 'dark_mode' }}</mat-icon>
  </button>
</mat-toolbar>
