<div class="app-shell">
  <!-- Sidebar -->
  <nav class="sidebar" data-testid="sidebar">
    <div class="sidebar-logo" data-testid="sidebar-logo">
      <mat-icon class="logo-icon">shield</mat-icon>
      <span class="logo-text">TRACEQ</span>
    </div>
    <div class="sidebar-nav">
      @for (item of navItems; track item.path) {
        <a
          class="nav-item"
          [routerLink]="item.path"
          routerLinkActive="nav-item--active"
          [attr.data-testid]="'nav-' + item.label.toLowerCase()"
        >
          <mat-icon class="nav-icon">{{ item.icon }}</mat-icon>
          <span class="nav-label">{{ item.label }}</span>
        </a>
      }
    </div>
  </nav>

  <!-- Main Content -->
  <div class="main">
    <!-- Header -->
    <header class="header" data-testid="header">
      <div class="header-left">
        <h1 class="header-title" data-testid="page-title">
          <!-- Title set by route -->
        </h1>
      </div>
      <div class="header-spacer"></div>
      <div class="header-search" data-testid="header-search">
        <mat-icon class="search-icon">search</mat-icon>
        <span class="search-placeholder">Search requirements...</span>
      </div>
      <button
        mat-icon-button
        class="theme-toggle"
        data-testid="theme-toggle"
        matTooltip="Toggle theme"
      >
        <mat-icon>light_mode</mat-icon>
      </button>
      <div class="user-avatar" data-testid="user-avatar">
        <span class="avatar-text">JD</span>
      </div>
    </header>

    <!-- Page Content -->
    <main class="content" data-testid="page-content">
      <router-outlet />
    </main>
  </div>
</div>
