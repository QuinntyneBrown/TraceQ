<mat-button-toggle-group
  [value]="value()"
  (change)="value.set($event.value)"
  class="tq-toggle-group"
>
  @for (option of options(); track option.value) {
    <mat-button-toggle [value]="option.value" class="tq-toggle">
      @if (option.icon) {
        <mat-icon>{{ option.icon }}</mat-icon>
      }
      <span class="tq-toggle-label">{{ option.label }}</span>
    </mat-button-toggle>
  }
</mat-button-toggle-group>
